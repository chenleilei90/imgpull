<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImgPull V2 Deliveries</title>
    <style>
        :root {
            --bg: #f4efe6;
            --panel: #fffaf2;
            --line: #dccfb7;
            --ink: #2d2418;
            --muted: #6b5b47;
            --brand: #b35c2e;
            --brand-dark: #7e3d1d;
            --ok: #276749;
            --sea: #30565b;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, #f7dcc2 0, transparent 30%),
                radial-gradient(circle at bottom right, #ecd8b9 0, transparent 35%),
                var(--bg);
            color: var(--ink);
        }
        .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 60px; }
        .topbar { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:18px; }
        .topbar a { text-decoration:none; color:white; background:var(--brand); border-radius:14px; padding:12px 14px; }
        .panel { background:rgba(255,250,242,0.92); border:1px solid var(--line); border-radius:24px; padding:20px; backdrop-filter:blur(10px); }
        .grid { display:grid; grid-template-columns:220px 1fr auto; gap:12px; }
        input, button, select { width:100%; padding:12px 14px; border-radius:14px; border:1px solid var(--line); font:inherit; }
        button { cursor:pointer; background:var(--brand); color:white; border:none; }
        button.secondary { background:var(--sea); }
        button.ghost { background:#ede1cf; color:#433528; }
        button:hover { background:var(--brand-dark); }
        button.secondary:hover { background:#224144; }
        button.ghost:hover { background:#e2d1ba; }
        .meta { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; color:var(--muted); }
        .chip { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; background:#f2e5d1; border-radius:999px; }
        .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
        .actions select { width:auto; min-width:180px; }
        .cards { display:grid; gap:14px; margin-top:18px; }
        .card { border:1px solid var(--line); border-radius:18px; padding:16px; background:white; }
        .title { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:8px; }
        .badge { display:inline-block; padding:4px 10px; border-radius:999px; font-size:12px; background:#d8f3df; color:var(--ok); }
        code { display:block; padding:10px 12px; background:#fbf6ee; border-radius:12px; overflow-x:auto; margin-top:8px; white-space:pre-wrap; word-break:break-all; }
        .empty { padding:22px; border:1px dashed var(--line); border-radius:16px; color:var(--muted); text-align:center; margin-top:18px; }
        .small { font-size:13px; color:var(--muted); }
        .command-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
        .command-row button { width:auto; padding:10px 12px; }
        .toast {
            position: fixed;
            right: 18px;
            bottom: 18px;
            background: #2d2418;
            color: white;
            padding: 12px 16px;
            border-radius: 14px;
            box-shadow: 0 16px 32px rgba(45, 36, 24, 0.16);
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .toast.show { opacity:1; transform:translateY(0); }
        @media (max-width:760px) { .grid { grid-template-columns:1fr; } .actions { flex-direction:column; } .actions select { width:100%; } .topbar { flex-direction:column; align-items:flex-start; } }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <div>
                <div class="small">ImgPull V2 / 我的交付镜像</div>
                <h1 style="margin:0; font-size:32px;">这里只看你已经能拉的镜像。</h1>
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <a href="/v2">首页</a>
                <a href="/v2/console">控制台</a>
            </div>
        </div>

        <section class="panel">
            <div class="grid">
                <input id="code" placeholder="输入串码">
                <input id="filterKeyword" placeholder="按镜像名筛选，例如 nginx">
                <button id="loadBtn">加载交付镜像</button>
            </div>
            <div class="meta">
                <span class="chip" id="namespaceInfo">命名空间：未验证</span>
                <span class="chip" id="countInfo">已交付：0</span>
            </div>
            <div class="actions">
                <select id="projectFilter">
                    <option value="">全部项目</option>
                </select>
                <button id="refreshBtn" class="secondary" type="button">刷新</button>
            </div>
        </section>

        <section id="deliveryCards" class="cards"></section>
    </div>

    <div id="toast" class="toast">已复制</div>

    <script>
        const codeEl = document.getElementById('code');
        const filterKeywordEl = document.getElementById('filterKeyword');
        const namespaceInfoEl = document.getElementById('namespaceInfo');
        const countInfoEl = document.getElementById('countInfo');
        const projectFilterEl = document.getElementById('projectFilter');
        const cardsEl = document.getElementById('deliveryCards');
        const toastEl = document.getElementById('toast');
        let deliveryImages = [];
        let harborDomain = 'harbor.wh02.com';

        function getParamCode() {
            const code = new URLSearchParams(window.location.search).get('code');
            if (code) codeEl.value = code;
        }

        function showToast(message) {
            toastEl.textContent = message;
            toastEl.classList.add('show');
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => toastEl.classList.remove('show'), 1800);
        }

        async function copyText(text, successMessage) {
            try {
                await navigator.clipboard.writeText(text);
                showToast(successMessage || '已复制');
            } catch (error) {
                window.prompt('复制失败，请手动复制下面内容：', text);
            }
        }

        function buildPullCommand(fullName) {
            return `docker pull ${fullName}`;
        }

        function buildLoginAndPullCommand(fullName) {
            return `docker login ${harborDomain}\ndocker pull ${fullName}`;
        }

        function renderCommandButtons(fullName) {
            return `
                <div class="command-row">
                    <button type="button" class="ghost" data-copy="${encodeURIComponent(buildPullCommand(fullName))}" data-label="拉取命令">复制 pull 命令</button>
                    <button type="button" class="ghost" data-copy="${encodeURIComponent(buildLoginAndPullCommand(fullName))}" data-label="登录加拉取命令">复制 login + pull</button>
                </div>
            `;
        }

        function bindCopyButtons(scope) {
            scope.querySelectorAll('[data-copy]').forEach((button) => {
                button.addEventListener('click', async () => {
                    const text = decodeURIComponent(button.getAttribute('data-copy'));
                    const label = button.getAttribute('data-label') || '命令';
                    await copyText(text, `${label}已复制`);
                });
            });
        }

        async function loadSettings() {
            const response = await fetch('/api/v2/settings');
            const data = await response.json();
            if (response.ok && data.success) {
                harborDomain = data.settings.harborDomain;
            }
        }

        async function loadMe() {
            const code = codeEl.value.trim();
            if (!code) throw new Error('请先输入串码');
            const response = await fetch(`/api/v2/me?code=${encodeURIComponent(code)}`);
            const data = await response.json();
            if (!response.ok || !data.success) throw new Error(data.error || '串码无效');
            namespaceInfoEl.textContent = `命名空间：${data.accessCode.harborProjectName}`;
        }

        function rebuildProjectFilter(images) {
            const projectSet = new Set();
            images.forEach((item) => (item.projectNames || []).forEach((name) => projectSet.add(name)));
            const current = projectFilterEl.value;
            projectFilterEl.innerHTML = '<option value="">全部项目</option>';
            Array.from(projectSet).sort().forEach((name) => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                projectFilterEl.appendChild(option);
            });
            if (Array.from(projectSet).includes(current)) {
                projectFilterEl.value = current;
            }
        }

        function render() {
            const keyword = filterKeywordEl.value.trim().toLowerCase();
            const projectName = projectFilterEl.value;
            const filtered = deliveryImages.filter((item) => {
                const byKeyword = !keyword || item.displayName.toLowerCase().includes(keyword) || item.source.fullName.toLowerCase().includes(keyword);
                const byProject = !projectName || (item.projectNames || []).includes(projectName);
                return byKeyword && byProject;
            });
            countInfoEl.textContent = `已交付：${filtered.length}`;

            if (!filtered.length) {
                cardsEl.innerHTML = '<div class="empty">当前筛选条件下没有已交付镜像。</div>';
                return;
            }

            cardsEl.innerHTML = '';
            filtered.forEach((item) => {
                const card = document.createElement('article');
                card.className = 'card';
                card.innerHTML = `
                    <div class="title">
                        <strong>${item.displayName}</strong>
                        <span class="badge">已交付</span>
                    </div>
                    <div class="small">所属项目：${(item.projectNames || []).join(' / ') || '未分组'}</div>
                    <code>拉取地址：${item.userTarget.fullName}</code>
                    <code>源镜像：${item.source.fullName}</code>
                    <code>缓存来源：${item.local.fullName || '默认缓存已写入'}</code>
                    ${renderCommandButtons(item.userTarget.fullName)}
                `;
                bindCopyButtons(card);
                cardsEl.appendChild(card);
            });
        }

        async function loadDeliveries() {
            try {
                await Promise.all([loadSettings(), loadMe()]);
                const code = codeEl.value.trim();
                const response = await fetch(`/api/v2/my-deliveries?code=${encodeURIComponent(code)}`);
                const data = await response.json();
                if (!response.ok || !data.success) throw new Error(data.error || '加载失败');
                deliveryImages = data.images;
                rebuildProjectFilter(deliveryImages);
                render();
            } catch (error) {
                cardsEl.innerHTML = `<div class="empty">${error.message}</div>`;
                countInfoEl.textContent = '已交付：0';
            }
        }

        document.getElementById('loadBtn').addEventListener('click', loadDeliveries);
        document.getElementById('refreshBtn').addEventListener('click', loadDeliveries);
        filterKeywordEl.addEventListener('input', render);
        projectFilterEl.addEventListener('change', render);
        getParamCode();
        if (codeEl.value.trim()) loadDeliveries();
    </script>
</body>
</html>
