<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>KubeaszPull - 专业镜像下载系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC','Microsoft YaHei','PingFang SC','Hiragino Sans GB','Heiti SC','WenQuanYi Micro Hei','Source Han Sans SC','Arial Unicode MS',Arial,sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .feature-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
        }

        .feature-card h3 {
            color: #4a5568;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .feature-card p {
            color: #718096;
            font-size: 0.9rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .card h2 {
            color: #4a5568;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #38b2ac 0%, #319795 100%);
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .step {
            display: flex;
            align-items: center;
            color: white;
            opacity: 0.5;
            transition: all 0.3s ease;
            cursor: default;
        }

        .step.active {
            opacity: 1;
        }

        .step.completed {
            opacity: 0.8;
            cursor: pointer;
        }

        .step.completed:hover {
            opacity: 1;
            transform: scale(1.05);
        }

        .step-number {
            background: rgba(255, 255, 255, 0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin-right: 10px;
            transition: all 0.3s ease;
        }

        .step.active .step-number {
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
        }

        .step.completed .step-number {
            background: #48bb78;
            color: white;
        }

        .step.completed:hover .step-number {
            background: #38a169;
            transform: scale(1.1);
        }

        .step-connector {
            width: 80px;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            margin: 0 20px;
        }

        .step.completed + .step .step-connector {
            background: #48bb78;
        }

        .project-selector {
            display: none;
            grid-column: 1 / -1;
        }

        .version-selector {
            display: none;
            grid-column: 1 / -1;
        }

        .images-display {
            display: none;
            grid-column: 1 / -1;
        }

        .selector-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 20px;
            align-items: end;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .project-item,
        .version-item {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .project-item:hover,
        .version-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-color: #667eea;
        }

        .project-item.selected,
        .version-item.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #f0f8ff 0%, #e6f3ff 100%);
        }

        .project-item h3,
        .version-item h3 {
            color: #4a5568;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .project-item p,
        .version-item p {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .project-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        .meta-badge {
            background: #e2e8f0;
            color: #4a5568;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-success {
            background: #c6f6d5;
            color: #22543d;
        }

        .badge-warning {
            background: #fef5e7;
            color: #d69e2e;
        }

        .badge-secondary {
            background: #e2e8f0;
            color: #718096;
        }

        .badge-info {
            background: #bee3f8;
            color: #2a69ac;
        }

        .images-container {
            margin-top: 20px;
        }

        .images-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            border-radius: 15px;
        }

        .images-stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4a5568;
            display: block;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #718096;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        .image-item {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .image-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .image-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .image-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #4a5568;
        }

        .image-badge {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-core {
            background: #bee3f8;
            color: #2a69ac;
        }

        .badge-optional {
            background: #faf089;
            color: #744210;
        }

        .image-description {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .image-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.8rem;
            color: #a0aec0;
        }

        .image-commands {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .command-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 8px;
            background: white;
            border-radius: 6px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.8rem;
        }

        .command-text {
            flex: 1;
            word-break: break-all;
            margin-right: 10px;
        }

        .copy-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: #38a169;
            transform: scale(1.05);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .actions-bar {
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.9rem;
            width: auto;
        }

        .back-btn {
            background: linear-gradient(135deg, #718096 0%, #4a5568 100%);
        }

        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            min-width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .alert.success {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        }

        .alert.error {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
        }

        .alert.warning {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
        }

        .alert.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .selector-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .project-grid,
            .images-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2rem;
            }

            .images-header {
                flex-direction: column;
                gap: 15px;
            }
            
            .images-stats {
                justify-content: center;
            }
            
            .step-connector {
                width: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>KubeaszPull</h1>
            <p>专业的Kubeasz镜像付费下载系统</p>
        </div>

        <!-- 步骤指示器 -->
        <div class="step-indicator">
            <div class="step active" id="step1" onclick="stepClick(1)">
                <div class="step-number">1</div>
                <span>获取串码</span>
            </div>
            <div class="step-connector"></div>
            <div class="step" id="step2" onclick="stepClick(2)">
                <div class="step-number">2</div>
                <span>选择项目</span>
            </div>
            <div class="step-connector"></div>
            <div class="step" id="step3" onclick="stepClick(3)">
                <div class="step-number">3</div>
                <span>选择版本</span>
            </div>
            <div class="step-connector"></div>
            <div class="step" id="step4" onclick="stepClick(4)">
                <div class="step-number">4</div>
                <span>下载镜像</span>
            </div>
        </div>

        <!-- 功能特色卡片 -->
        <div class="feature-cards">
            <div class="feature-card">
                <h3>安全可靠</h3>
                <p>所有镜像经过严格测试，确保在Kubernetes集群中稳定运行</p>
            </div>
            <div class="feature-card">
                <h3>快速下载</h3>
                <p>基于Harbor私有仓库，提供高速稳定的镜像下载服务</p>
            </div>
            <div class="feature-card">
                <h3>版本管理</h3>
                <p>支持多版本镜像管理，满足不同环境的部署需求</p>
            </div>
        </div>

        <!-- 主要内容区域 -->
        <div class="main-content">
            <!-- 付费获取串码 -->
            <div class="card">
                <h2>付费获取串码</h2>
                <form id="createCodeForm">
                    <div class="form-group">
                        <label for="email">邮箱地址 *</label>
                        <input type="email" id="email" name="email" required placeholder="请输入您的邮箱地址">
                    </div>
                    <div class="form-group">
                        <label for="expireDays">有效期 (天)</label>
                        <select id="expireDays" name="expireDays">
                            <option value="7">7天</option>
                            <option value="15" selected>15天</option>
                            <option value="30">30天</option>
                            <option value="60">60天</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="paymentMethod">支付方式</label>
                        <select id="paymentMethod" name="paymentMethod">
                            <option value="alipay">支付宝</option>
                            <option value="wechat">微信支付</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">支付 ¥2.00 获取串码</button>
                </form>
            </div>

            <!-- 使用串码验证 -->
            <div class="card">
                <h2>使用串码查看镜像</h2>
                <form id="verifyCodeForm">
                    <div class="form-group">
                        <label for="accessCode">访问串码 *</label>
                        <input type="text" id="accessCode" name="code" required placeholder="请输入您的串码">
                    </div>
                    <button type="submit" class="btn btn-secondary">验证串码</button>
                </form>
            </div>
        </div>

        <!-- 项目选择界面 -->
        <div class="card project-selector" id="projectSelector">
            <div class="actions-bar">
                <h2>选择项目</h2>
                <div class="action-buttons">
                    <button class="btn btn-small back-btn" onclick="goBack()">返回</button>
                </div>
            </div>
            
            <div class="project-grid" id="projectGrid">
                <div class="loading">
                    <div class="spinner"></div>
                    加载项目中...
                </div>
            </div>
        </div>

        <!-- 版本选择界面 -->
        <div class="card version-selector" id="versionSelector">
            <div class="actions-bar">
                <h2>选择版本</h2>
                <div class="action-buttons">
                    <button class="btn btn-small back-btn" onclick="goBack()">返回项目选择</button>
                </div>
            </div>
            
            <div class="project-grid" id="versionGrid">
                <div class="loading">
                    <div class="spinner"></div>
                    加载版本中...
                </div>
            </div>
        </div>

        <!-- 镜像显示界面 -->
        <div class="card images-display" id="imagesDisplay">
            <div class="actions-bar">
                <h2>镜像下载</h2>
                <div class="action-buttons">
                    <button class="btn btn-small back-btn" onclick="goBack()">返回版本选择</button>
                    <button class="btn btn-small btn-success" onclick="copyAllCommands()">复制所有下载命令</button>
                </div>
            </div>

            <div class="images-header">
                <div>
                    <h3 id="selectedProjectName">项目名称</h3>
                    <p id="selectedVersionInfo">版本信息</p>
                </div>
                <div class="images-stats">
                    <div class="stat-item">
                        <span class="stat-number" id="totalImages">0</span>
                        <span class="stat-label">总镜像</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="coreImages">0</span>
                        <span class="stat-label">核心镜像</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="totalSize">0MB</span>
                        <span class="stat-label">总大小</span>
                    </div>
                </div>
        </div>

            <div class="images-container">
                <div class="images-grid" id="imagesGrid">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载镜像中...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let accessCode = '';
        let selectedProject = null;
        let selectedVersion = null;
        let imageData = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadSystemInfo();
        });

        // 加载系统信息
        async function loadSystemInfo() {
            try {
                const response = await fetch('/api/system-info');
                const data = await response.json();
                if (data.name) {
                    document.title = data.name;
                }
            } catch (error) {
                console.error('加载系统信息失败:', error);
            }
        }

        // 创建串码表单提交
        document.getElementById('createCodeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);

            try {
                const response = await fetch('/api/create-code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: formData.get('email'),
                        expire_days: parseInt(formData.get('expireDays')),
                        payment_method: formData.get('paymentMethod')
                    })
                });

                const data = await response.json();
                if (data.success) {
                    showAlert(`串码创建成功！串码：${data.code}`, 'success');
                    document.getElementById('accessCode').value = data.code;
                } else {
                    showAlert(data.error || '创建串码失败', 'error');
                }
            } catch (error) {
                console.error('创建串码失败:', error);
                showAlert('创建串码失败，请检查网络连接', 'error');
            }
        });

        // 验证串码表单提交
        document.getElementById('verifyCodeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            accessCode = formData.get('code');
            
            if (!accessCode) {
                showAlert('请输入访问串码', 'error');
                return;
            }
            
            try {
                // 验证串码并加载项目列表
                const response = await fetch('/api/projects');
                const projects = await response.json();
                
                if (projects && projects.length > 0) {
                    showStep(2);
                    loadProjects(projects);
                } else {
                    showAlert('暂无可用项目', 'error');
                }
            } catch (error) {
                console.error('验证串码失败:', error);
                showAlert('验证串码失败，请检查串码是否正确', 'error');
            }
        });

        // 显示步骤
        function showStep(step) {
            // 隐藏所有内容区域
            document.querySelector('.main-content').style.display = step === 1 ? 'grid' : 'none';
            document.getElementById('projectSelector').style.display = step === 2 ? 'block' : 'none';
            document.getElementById('versionSelector').style.display = step === 3 ? 'block' : 'none';
            document.getElementById('imagesDisplay').style.display = step === 4 ? 'block' : 'none';
            
            // 更新步骤指示器
            for (let i = 1; i <= 4; i++) {
                const stepEl = document.getElementById(`step${i}`);
                stepEl.classList.remove('active', 'completed');
                
                if (i < step) {
                    stepEl.classList.add('completed');
                } else if (i === step) {
                    stepEl.classList.add('active');
                }
            }
            
            currentStep = step;
        }

        // 返回上一步
        function goBack() {
            if (currentStep > 1) {
                showStep(currentStep - 1);
                
                // 清除选择状态
                if (currentStep === 1) {
                    accessCode = '';
                    selectedProject = null;
                    selectedVersion = null;
                    imageData = null;
                } else if (currentStep === 2) {
                    selectedProject = null;
                    selectedVersion = null;
                    imageData = null;
                } else if (currentStep === 3) {
                    selectedVersion = null;
                    imageData = null;
                }
            }
        }

        // 加载项目列表
        function loadProjects(projects) {
            const grid = document.getElementById('projectGrid');
            grid.innerHTML = '';
            
            if (projects.length === 0) {
                grid.innerHTML = '<div class="loading">暂无可用项目</div>';
                return;
            }
            
            projects.forEach(project => {
                if (project.status === 'active') {
                    const versionCount = project.version_count || 0;
                    const imageCount = project.image_count || 0;
                    const hasVersions = versionCount > 0;
                    
                    const projectEl = document.createElement('div');
                    projectEl.className = 'project-item';
                    projectEl.onclick = () => selectProject(project);
                    
                    // 如果没有版本，添加特殊样式提示
                    if (!hasVersions) {
                        projectEl.style.opacity = '0.7';
                        projectEl.style.cursor = 'not-allowed';
                        projectEl.onclick = () => showAlert('该项目暂无可用版本', 'warning');
                    }
                    
                    projectEl.innerHTML = `
                        <h3>${project.name}</h3>
                        <p>${project.description || '暂无描述'}</p>
                        <div class="project-meta">
                            <div>
                                <span class="meta-badge ${hasVersions ? '' : 'badge-warning'}">${versionCount} 个版本</span>
                            </div>
                            <div>
                                <span class="meta-badge ${imageCount > 0 ? 'badge-success' : 'badge-secondary'}">${imageCount} 个镜像</span>
                            </div>
                        </div>
                        <div class="project-meta" style="margin-top: 10px; padding-top: 10px;">
                            <div>
                                <span class="meta-badge">Harbor: ${project.harbor_domain}</span>
                            </div>
                            <div>
                                <span class="meta-badge badge-info">${project.harbor_project}</span>
                            </div>
                        </div>
                        ${!hasVersions ? '<div style="margin-top: 10px; padding: 8px; background: #fef5e7; border-radius: 6px; font-size: 0.8rem; color: #d69e2e;">⚠️ 该项目暂无可用版本</div>' : ''}
                    `;
                    grid.appendChild(projectEl);
                }
            });
        }

        // 选择项目
        async function selectProject(project) {
            // 检查项目是否有版本
            if (project.version_count === 0) {
                showAlert('该项目暂无可用版本，请联系管理员添加版本', 'warning');
                return;
            }
            
            selectedProject = project;
            
            try {
                showAlert('正在加载项目版本...', 'info');
                const response = await fetch(`/api/projects/${project.id}/versions`);
                const versions = await response.json();
                
                if (versions && versions.length > 0) {
                    showStep(3);
                    loadVersions(versions);
                    showAlert(`已加载 ${versions.length} 个版本`, 'success');
                } else {
                    showAlert('该项目暂无可用版本', 'error');
                }
            } catch (error) {
                console.error('加载版本失败:', error);
                showAlert('加载版本失败，请检查网络连接', 'error');
            }
        }

        // 加载版本列表
        function loadVersions(versions) {
            const grid = document.getElementById('versionGrid');
            grid.innerHTML = '';
            
            if (versions.length === 0) {
                grid.innerHTML = '<div class="loading">暂无可用版本</div>';
                return;
            }
            
            versions.forEach(version => {
                if (version.status === 'active') {
                    const imageCount = version.image_count || 0;
                    const hasImages = imageCount > 0;
                    
                    const versionEl = document.createElement('div');
                    versionEl.className = 'version-item';
                    versionEl.onclick = () => selectVersion(version);
                    
                    // 如果没有镜像，添加特殊样式提示
                    if (!hasImages) {
                        versionEl.style.opacity = '0.7';
                        versionEl.style.cursor = 'not-allowed';
                        versionEl.onclick = () => showAlert('该版本暂无可用镜像', 'warning');
                    }
                    
                    versionEl.innerHTML = `
                        <h3>${version.version}</h3>
                        <p>${version.description || '暂无描述'}</p>
                        <div class="project-meta">
                            <div>
                                <span class="meta-badge ${hasImages ? 'badge-success' : 'badge-warning'}">${imageCount} 个镜像</span>
                            </div>
                            <div>
                                <span class="meta-badge badge-info">${new Date(version.created_at).toLocaleDateString()}</span>
                            </div>
                        </div>
                        ${!hasImages ? '<div style="margin-top: 10px; padding: 8px; background: #fef5e7; border-radius: 6px; font-size: 0.8rem; color: #d69e2e;">⚠️ 该版本暂无可用镜像</div>' : ''}
                    `;
                    grid.appendChild(versionEl);
                }
            });
        }

        // 选择版本
        async function selectVersion(version) {
            // 检查版本是否有镜像
            if (version.image_count === 0) {
                showAlert('该版本暂无可用镜像，请联系管理员添加镜像', 'warning');
                return;
            }
            
            selectedVersion = version;
            
            try {
                showAlert('正在加载镜像列表...', 'info');
                const response = await fetch(`/api/projects/${selectedProject.id}/versions/${version.id}/images?code=${accessCode}`);
                const data = await response.json();
                
                if (data.success) {
                    imageData = data;
                    showStep(4);
                    loadImages(data);
                    showAlert(`已加载 ${data.images.length} 个镜像`, 'success');
                } else {
                    showAlert(data.error || '加载镜像失败，请检查串码是否有效', 'error');
                }
            } catch (error) {
                console.error('加载镜像失败:', error);
                showAlert('加载镜像失败，请检查串码是否有效', 'error');
            }
        }

        // 加载镜像列表
        function loadImages(data) {
            // 更新头部信息
            document.getElementById('selectedProjectName').textContent = data.project.name;
            document.getElementById('selectedVersionInfo').textContent = `${data.version.version} - ${data.version.description || ''}`;
            document.getElementById('totalImages').textContent = data.image_count;
            document.getElementById('coreImages').textContent = data.core_count;
            document.getElementById('totalSize').textContent = data.total_size;
            
            // 加载镜像列表
            const grid = document.getElementById('imagesGrid');
            grid.innerHTML = '';
            
            if (data.images.length === 0) {
                grid.innerHTML = '<div class="loading">该版本暂无镜像</div>';
                return;
            }
            
            data.images.forEach(image => {
                const imageEl = document.createElement('div');
                imageEl.className = 'image-item';
                imageEl.innerHTML = `
                    <div class="image-header">
                        <span class="image-name">${image.name}</span>
                        <span class="image-badge ${image.is_core ? 'badge-core' : 'badge-optional'}">
                            ${image.is_core ? '核心' : '可选'}
                        </span>
                    </div>
                    <div class="image-description">
                        ${image.description || '暂无描述'}
                    </div>
                    <div class="image-meta">
                        <span>大小: ${image.image_size || '未知'}</span>
                        <span>更新: ${new Date(image.updated_at).toLocaleDateString()}</span>
                    </div>
                    <div class="image-commands">
                        <div class="command-item">
                            <div class="command-text">${image.commands.pull}</div>
                            <button class="copy-btn" onclick="copyToClipboard('${image.commands.pull}')">复制</button>
                        </div>
                        <div class="command-item">
                            <div class="command-text">${image.commands.tag}</div>
                            <button class="copy-btn" onclick="copyToClipboard('${image.commands.tag}')">复制</button>
                        </div>
                    </div>
                `;
                grid.appendChild(imageEl);
            });
        }

        // 复制所有下载命令
        function copyAllCommands() {
            if (!imageData || !imageData.images) {
                showAlert('没有可用的镜像命令', 'error');
                return;
            }
            
            const commands = imageData.images.map(image => image.commands.pull).join('\n');
            copyToClipboard(commands);
        }

        // 复制到剪贴板
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                showAlert('已复制到剪贴板', 'success');
            } catch (error) {
                console.error('复制失败:', error);
                showAlert('复制失败', 'error');
            }
        }

        // 显示提示信息
        function showAlert(message, type = 'info') {
            // 移除现有的提示框
            const existingAlert = document.querySelector('.alert');
            if (existingAlert) {
                existingAlert.remove();
            }
            
            // 创建新的提示框
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.textContent = message;
            document.body.appendChild(alert);
            
            // 显示动画
            setTimeout(() => {
                alert.classList.add('show');
            }, 100);
            
            // 自动隐藏
            setTimeout(() => {
                alert.classList.remove('show');
                setTimeout(() => {
                    if (alert.parentNode) {
                        alert.remove();
                    }
                }, 300);
            }, 3000);
        }

        // 步骤点击事件
        function stepClick(step) {
            // 只允许点击已完成的步骤
            const stepEl = document.getElementById(`step${step}`);
            if (!stepEl.classList.contains('completed') && step !== currentStep) {
                return;
            }
            
            // 如果点击的是当前步骤，不执行任何操作
            if (step === currentStep) {
                return;
            }
            
            // 返回到指定步骤
            if (step < currentStep) {
                showStep(step);
                
                // 根据返回的步骤重新加载相应数据
                if (step === 1) {
                    // 返回到获取串码步骤，清除所有数据
                    accessCode = '';
                    selectedProject = null;
                    selectedVersion = null;
                    imageData = null;
                    document.getElementById('accessCode').value = '';
                } else if (step === 2) {
                    // 返回到选择项目步骤，保留串码，清除项目选择
                    selectedProject = null;
                    selectedVersion = null;
                    imageData = null;
                    // 重新加载项目列表
                    if (accessCode) {
                        loadProjectsFromAPI();
                    }
                } else if (step === 3) {
                    // 返回到选择版本步骤，保留项目选择，清除版本选择
                    selectedVersion = null;
                    imageData = null;
                    // 重新加载版本列表
                    if (selectedProject) {
                        loadVersionsFromAPI();
                    }
                }
                
                showAlert(`已返回到步骤${step}`, 'success');
            }
        }
        
        // 从API重新加载项目列表
        async function loadProjectsFromAPI() {
            try {
                const response = await fetch('/api/projects');
                const projects = await response.json();
                if (projects && projects.length > 0) {
                    loadProjects(projects);
                }
            } catch (error) {
                console.error('重新加载项目失败:', error);
                showAlert('重新加载项目失败', 'error');
            }
        }
        
        // 从API重新加载版本列表
        async function loadVersionsFromAPI() {
            try {
                const response = await fetch(`/api/projects/${selectedProject.id}/versions`);
                const versions = await response.json();
                if (versions && versions.length > 0) {
                    loadVersions(versions);
                }
            } catch (error) {
                console.error('重新加载版本失败:', error);
                showAlert('重新加载版本失败', 'error');
            }
        }
    </script>
</body>
</html>
