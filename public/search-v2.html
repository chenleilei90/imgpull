<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImgPull V2 Console</title>
    <style>
        :root {
            --bg: #f4efe6;
            --panel: #fffaf2;
            --line: #dccfb7;
            --ink: #2d2418;
            --muted: #6b5b47;
            --brand: #b35c2e;
            --brand-dark: #7e3d1d;
            --ink-soft: #433528;
            --ok: #276749;
            --warn: #9a4d1f;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, #f7dcc2 0, transparent 30%),
                radial-gradient(circle at bottom right, #ecd8b9 0, transparent 35%),
                var(--bg);
            color: var(--ink);
        }
        .wrap {
            max-width: 1240px;
            margin: 0 auto;
            padding: 28px 20px 60px;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 18px;
        }
        .topbar a {
            text-decoration: none;
            color: white;
            background: var(--brand);
            border-radius: 14px;
            padding: 12px 14px;
        }
        .hero {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 18px;
            margin-bottom: 18px;
        }
        .panel {
            background: rgba(255, 250, 242, 0.92);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        h1 { margin: 0 0 8px; font-size: 34px; }
        p { margin: 0; color: var(--muted); line-height: 1.7; }
        .grid {
            display: grid;
            grid-template-columns: 220px 1fr auto;
            gap: 12px;
        }
        .layout {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 18px;
        }
        input, button, select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid var(--line);
            font: inherit;
        }
        button {
            cursor: pointer;
            background: var(--brand);
            color: white;
            border: none;
        }
        button:hover { background: var(--brand-dark); }
        .muted { color: var(--muted); }
        .meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
            color: var(--muted);
            font-size: 14px;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #f2e5d1;
            color: var(--ink-soft);
            border-radius: 999px;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .actions input, .actions select { width: auto; min-width: 180px; }
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .results, .stack {
            display: grid;
            gap: 14px;
        }
        .card {
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 16px;
            background: white;
        }
        .title {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 8px;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            background: #efe0c8;
            color: var(--brand-dark);
        }
        .badge.ok {
            background: #d8f3df;
            color: var(--ok);
        }
        .badge.warn {
            background: #f5dfd1;
            color: var(--warn);
        }
        code {
            display: block;
            padding: 10px 12px;
            background: #fbf6ee;
            border-radius: 12px;
            overflow-x: auto;
            margin-top: 8px;
        }
        .empty {
            padding: 22px;
            border: 1px dashed var(--line);
            border-radius: 16px;
            color: var(--muted);
            text-align: center;
        }
        .small {
            font-size: 13px;
            color: var(--muted);
        }
        @media (max-width: 960px) {
            .hero, .layout { grid-template-columns: 1fr; }
        }
        @media (max-width: 760px) {
            .grid { grid-template-columns: 1fr; }
            .actions { flex-direction: column; }
            .actions input, .actions select { width: 100%; }
            .topbar { flex-direction: column; align-items: flex-start; }
            h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <div>
                <div class="small">ImgPull V2 / 用户控制台</div>
                <h1>默认缓存优先，用户只拉自己的镜像。</h1>
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <a href="/v2">首页</a>
                <a href="/v2/admin">后台</a>
            </div>
        </div>

        <section class="hero">
            <article class="panel">
                <div class="grid">
                    <input id="code" placeholder="输入串码">
                    <input id="query" placeholder="搜索镜像，例如 nginx 或 calico/apiserver">
                    <button id="searchBtn">搜索镜像</button>
                </div>
                <div class="meta">
                    <span class="chip" id="namespaceInfo">命名空间：未验证</span>
                    <span class="chip" id="visibilityInfo">拉取方式：未确认</span>
                    <span class="chip" id="searchModeInfo">搜索策略：默认缓存优先</span>
                </div>
                <div class="actions">
                    <input id="projectName" placeholder="新项目名，例如 k8s-base">
                    <button id="createProjectBtn" type="button">创建我的项目</button>
                    <select id="projectSelect">
                        <option value="">先创建或选择项目</option>
                    </select>
                    <button id="refreshBtn" type="button">刷新我的项目和任务</button>
                </div>
            </article>
            <aside class="panel">
                <div class="section-title">
                    <strong>我的交付说明</strong>
                </div>
                <div class="stack">
                    <div class="card">
                        <div class="small">默认规则</div>
                        <p>系统只搜索默认私有缓存仓库。只有缓存没命中时，才去 Docker Hub 搜索并准备回填缓存。</p>
                    </div>
                    <div class="card">
                        <div class="small">你的拉取地址</div>
                        <p id="pullHint">请先验证串码，系统会展示你的 Harbor 命名空间和目标镜像地址。</p>
                    </div>
                </div>
            </aside>
        </section>

        <section class="layout">
            <div class="panel">
                <div class="section-title">
                    <strong>搜索结果</strong>
                    <span class="small">优先本地缓存，没有命中再查 Docker Hub</span>
                </div>
                <section class="results" id="results">
                    <div class="empty">输入串码并搜索镜像后，这里会显示结果。</div>
                </section>
            </div>
            <div class="stack">
                <section class="panel">
                    <div class="section-title">
                        <strong>我的项目</strong>
                        <span class="small" id="projectCountInfo">0 个项目</span>
                    </div>
                    <section id="projectList" class="stack">
                        <div class="empty">还没有项目。</div>
                    </section>
                </section>
                <section class="panel">
                    <div class="section-title">
                        <strong>最近任务</strong>
                        <span class="small">加入项目时自动排队</span>
                    </div>
                    <section id="taskList" class="stack">
                        <div class="empty">还没有任务。</div>
                    </section>
                </section>
            </div>
        </section>
    </div>

    <script>
        const codeEl = document.getElementById('code');
        const queryEl = document.getElementById('query');
        const projectNameEl = document.getElementById('projectName');
        const projectSelectEl = document.getElementById('projectSelect');
        const resultsEl = document.getElementById('results');
        const namespaceInfoEl = document.getElementById('namespaceInfo');
        const visibilityInfoEl = document.getElementById('visibilityInfo');
        const searchModeInfoEl = document.getElementById('searchModeInfo');
        const pullHintEl = document.getElementById('pullHint');
        const projectListEl = document.getElementById('projectList');
        const taskListEl = document.getElementById('taskList');
        const projectCountInfoEl = document.getElementById('projectCountInfo');

        function getCode() {
            return codeEl.value.trim();
        }

        function getParamCode() {
            const code = new URLSearchParams(window.location.search).get('code');
            if (code) {
                codeEl.value = code;
            }
        }

        async function loadMe() {
            const code = getCode();
            if (!code) return false;

            const response = await fetch(`/api/v2/me?code=${encodeURIComponent(code)}`);
            const data = await response.json();
            if (!response.ok || !data.success) {
                namespaceInfoEl.textContent = '命名空间：串码无效';
                visibilityInfoEl.textContent = '拉取方式：未知';
                pullHintEl.textContent = data.error || '串码无效';
                throw new Error(data.error || '串码无效');
            }

            namespaceInfoEl.textContent = `命名空间：${data.accessCode.harborProjectName}`;
            visibilityInfoEl.textContent = `拉取方式：${data.accessCode.visibility}`;
            pullHintEl.textContent = `你的镜像会分发到 ${data.accessCode.harborProjectName} 这个命名空间下，你后续只需要拉自己的地址。`;
            return true;
        }

        function renderProjectCards(projects) {
            projectCountInfoEl.textContent = `${projects.length} 个项目`;
            projectSelectEl.innerHTML = '<option value="">先创建或选择项目</option>';

            if (!projects.length) {
                projectListEl.innerHTML = '<div class="empty">还没有项目，先创建一个你自己的镜像组合项目。</div>';
                return;
            }

            projectListEl.innerHTML = '';
            projects.forEach((project) => {
                const option = document.createElement('option');
                option.value = project.id;
                option.textContent = `${project.name} (${project.image_count}个镜像)`;
                projectSelectEl.appendChild(option);

                const card = document.createElement('article');
                card.className = 'card';
                card.innerHTML = `
                    <div class="title">
                        <strong>${project.name}</strong>
                        <span class="badge">${project.image_count} 个镜像</span>
                    </div>
                    <div class="small">项目标识：${project.slug}</div>
                `;
                projectListEl.appendChild(card);
            });
        }

        async function loadProjects() {
            const code = getCode();
            if (!code) return;

            const response = await fetch(`/api/v2/projects?code=${encodeURIComponent(code)}`);
            const data = await response.json();
            if (!response.ok || !data.success) {
                renderProjectCards([]);
                return;
            }
            renderProjectCards(data.projects);
        }

        function renderTasks(tasks) {
            if (!tasks.length) {
                taskListEl.innerHTML = '<div class="empty">还没有任务，添加镜像到项目后会自动排队。</div>';
                return;
            }

            taskListEl.innerHTML = '';
            tasks.forEach((task) => {
                const card = document.createElement('article');
                card.className = 'card';
                card.innerHTML = `
                    <div class="title">
                        <strong>${task.displayName}</strong>
                        <span class="badge ${task.status === 'completed' ? 'ok' : task.status === 'failed' ? 'warn' : ''}">${task.status}</span>
                    </div>
                    <div class="small">项目：${task.projectName || '-'}</div>
                    <code>目标地址：${task.targetFullName}</code>
                    <div class="small">请求时间：${task.requestedAt || '-'}</div>
                `;
                taskListEl.appendChild(card);
            });
        }

        async function loadTasks() {
            const code = getCode();
            if (!code) return;
            const response = await fetch(`/api/v2/tasks?code=${encodeURIComponent(code)}`);
            const data = await response.json();
            if (!response.ok || !data.success) {
                renderTasks([]);
                return;
            }
            renderTasks(data.tasks);
        }

        async function createProject() {
            const code = getCode();
            const name = projectNameEl.value.trim();
            if (!code || !name) {
                alert('请先输入串码和项目名');
                return;
            }

            const response = await fetch('/api/v2/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, name })
            });
            const data = await response.json();
            if (!response.ok || !data.success) {
                alert(data.error || '创建项目失败');
                return;
            }

            projectNameEl.value = '';
            await loadProjects();
            projectSelectEl.value = String(data.project.id);
        }

        function renderResults(items) {
            resultsEl.innerHTML = '';
            if (!items.length) {
                resultsEl.innerHTML = '<div class="empty">没有搜索到镜像。</div>';
                return;
            }

            items.forEach((item) => {
                const card = document.createElement('article');
                card.className = 'card';
                const statusBadge = item.local.available ? '本地缓存已命中' : 'Docker Hub 候选';
                const badgeClass = item.local.available ? 'ok' : 'warn';
                card.innerHTML = `
                    <div class="title">
                        <strong>${item.displayName}</strong>
                        <span class="badge ${badgeClass}">${statusBadge}</span>
                    </div>
                    <div class="muted">${item.description || '暂无描述'}</div>
                    <code>源镜像：${item.source.fullName}</code>
                    <code>默认缓存：${item.local.fullName || '当前缓存里还没有，分发时会先进入默认缓存仓库'}</code>
                    <code>用户目标：${item.userTarget ? item.userTarget.fullName : '请先验证串码'}</code>
                    <div class="actions">
                        <button type="button">加入当前项目并排队分发</button>
                    </div>
                `;

                card.querySelector('button').addEventListener('click', async () => {
                    const projectId = projectSelectEl.value;
                    const code = getCode();
                    if (!projectId) {
                        alert('请先选择一个项目');
                        return;
                    }

                    const response = await fetch(`/api/v2/projects/${projectId}/images`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            code,
                            catalogImageId: item.id,
                            image: {
                                sourceType: item.sourceType,
                                registry: item.source.registry,
                                namespace: item.source.namespace,
                                repository: item.source.repository,
                                tag: item.source.tag,
                                digest: item.source.digest,
                                description: item.description,
                                localAvailable: item.local.available,
                                localRegistry: item.local.registry,
                                localNamespace: item.local.namespace,
                                localRepository: item.local.repository,
                                localTag: item.local.tag,
                                localFullName: item.local.fullName
                            }
                        })
                    });
                    const data = await response.json();
                    if (!response.ok || !data.success) {
                        alert(data.error || '加入项目失败');
                        return;
                    }
                    await loadProjects();
                    await loadTasks();
                    alert('镜像已加入项目，并已生成分发任务。');
                });

                resultsEl.appendChild(card);
            });
        }

        async function search() {
            const code = getCode();
            const query = queryEl.value.trim();
            if (!code || !query) {
                alert('请先输入串码和搜索词');
                return;
            }

            try {
                await loadMe();
                await loadProjects();
                await loadTasks();

                const response = await fetch(`/api/v2/search/images?code=${encodeURIComponent(code)}&q=${encodeURIComponent(query)}`);
                const data = await response.json();
                if (!response.ok || !data.success) {
                    alert(data.error || '搜索失败');
                    return;
                }
                searchModeInfoEl.textContent = `搜索策略：${data.searchMode === 'cache-only-hit' ? '默认缓存命中，未查 Docker Hub' : '默认缓存未命中，已查 Docker Hub'}`;
                renderResults(data.results);
            } catch (error) {
                alert(error.message || '搜索失败');
            }
        }

        async function refreshAll() {
            try {
                await loadMe();
                await loadProjects();
                await loadTasks();
            } catch (error) {
                if (getCode()) {
                    alert(error.message || '刷新失败');
                }
            }
        }

        document.getElementById('searchBtn').addEventListener('click', search);
        document.getElementById('createProjectBtn').addEventListener('click', createProject);
        document.getElementById('refreshBtn').addEventListener('click', refreshAll);
        getParamCode();
        if (getCode()) {
            refreshAll();
        }
    </script>
</body>
</html>
