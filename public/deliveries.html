<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImgPull 交付镜像</title>
    <style>
        :root {
            --bg: #eef4fb;
            --panel: rgba(255,255,255,0.9);
            --line: #d9e5f2;
            --ink: #0f172a;
            --muted: #607086;
            --brand: #0f6fff;
            --brand-dark: #0b57ca;
            --teal: #0ea5a4;
            --teal-dark: #0a8483;
            --ok: #16a34a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(15,111,255,0.16), transparent 28%),
                radial-gradient(circle at bottom right, rgba(14,165,164,0.14), transparent 30%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            color: var(--ink);
        }
        .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 60px; }
        .topbar { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:18px; }
        .topbar a {
            text-decoration:none;
            color:white;
            background:linear-gradient(135deg, var(--brand) 0%, #3389ff 100%);
            border-radius:14px;
            padding:12px 14px;
            box-shadow:0 14px 28px rgba(15,111,255,0.2);
        }
        .panel {
            background:var(--panel);
            border:1px solid var(--line);
            border-radius:24px;
            padding:20px;
            backdrop-filter:blur(12px);
            box-shadow:0 24px 56px rgba(15,23,42,0.1);
        }
        .grid { display:grid; grid-template-columns:220px 1fr auto; gap:12px; }
        input, button, select { width:100%; padding:12px 14px; border-radius:14px; border:1px solid var(--line); font:inherit; }
        input, select { background:#fff; color:var(--ink); }
        button {
            cursor:pointer;
            background:linear-gradient(135deg, var(--brand) 0%, #3389ff 100%);
            color:white;
            border:none;
            box-shadow:0 14px 28px rgba(15,111,255,0.18);
        }
        button.secondary {
            background:linear-gradient(135deg, var(--teal) 0%, #18b9b8 100%);
            box-shadow:0 14px 28px rgba(14,165,164,0.18);
        }
        button.ghost {
            background:#edf4ff;
            color:var(--brand);
            border:1px solid #cfe0ff;
            box-shadow:none;
        }
        button:hover { background:linear-gradient(135deg, var(--brand-dark) 0%, #236fe0 100%); }
        button.secondary:hover { background:linear-gradient(135deg, var(--teal-dark) 0%, #119897 100%); }
        button.ghost:hover { background:#e3eeff; }
        .meta { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; color:var(--muted); }
        .chip {
            display:inline-flex;
            align-items:center;
            gap:6px;
            padding:6px 12px;
            background:rgba(15,111,255,0.08);
            color:var(--brand);
            border-radius:999px;
            border:1px solid rgba(15,111,255,0.12);
        }
        .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
        .actions select { width:auto; min-width:180px; }
        .cards { display:grid; gap:14px; margin-top:18px; }
        .card {
            border:1px solid var(--line);
            border-radius:18px;
            padding:16px;
            background:linear-gradient(180deg, #ffffff 0%, #f6faff 100%);
        }
        .title { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:8px; }
        .badge {
            display:inline-block;
            padding:4px 10px;
            border-radius:999px;
            font-size:12px;
            background:rgba(22,163,74,0.1);
            color:var(--ok);
            border:1px solid rgba(22,163,74,0.14);
        }
        code {
            display:block;
            padding:10px 12px;
            background:#f3f8ff;
            border-radius:12px;
            overflow-x:auto;
            margin-top:8px;
            white-space:pre-wrap;
            word-break:break-all;
            border:1px solid #dde9f8;
        }
        .empty {
            padding:22px;
            border:1px dashed var(--line);
            border-radius:16px;
            color:var(--muted);
            text-align:center;
            margin-top:18px;
            background:rgba(255,255,255,0.65);
        }
        .small { font-size:13px; color:var(--muted); }
        .command-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
        .command-row button { width:auto; padding:10px 12px; }
        .toast {
            position: fixed;
            right: 18px;
            bottom: 18px;
            background: #0f172a;
            color: white;
            padding: 12px 16px;
            border-radius: 14px;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.2);
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .toast.show { opacity:1; transform:translateY(0); }
        @media (max-width:760px) { .grid { grid-template-columns:1fr; } .actions { flex-direction:column; } .actions select { width:100%; } .topbar { flex-direction:column; align-items:flex-start; } }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <div>
                <div class="small">ImgPull / 我的交付镜像</div>
                <h1 style="margin:0; font-size:32px;">这里只看你已经能拉的镜像。</h1>
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <a href="/">首页</a>
                <a href="/console">控制台</a>
            </div>
        </div>

        <section class="panel">
            <div class="grid">
                <input id="code" placeholder="输入串码">
                <input id="filterKeyword" placeholder="按镜像名筛选，例如 nginx">
                <button id="loadBtn">加载交付镜像</button>
            </div>
            <div class="meta">
                <span class="chip" id="namespaceInfo">命名空间：未验证</span>
                <span class="chip" id="countInfo">已交付：0</span>
            </div>
            <div class="actions">
                <select id="projectFilter">
                    <option value="">全部项目</option>
                </select>
                <button id="refreshBtn" class="secondary" type="button">刷新</button>
            </div>
        </section>

        <section id="deliveryCards" class="cards"></section>
    </div>

    <div id="toast" class="toast">已复制</div>

    <script>
        const codeEl = document.getElementById('code');
        const filterKeywordEl = document.getElementById('filterKeyword');
        const namespaceInfoEl = document.getElementById('namespaceInfo');
        const countInfoEl = document.getElementById('countInfo');
        const projectFilterEl = document.getElementById('projectFilter');
        const cardsEl = document.getElementById('deliveryCards');
        const toastEl = document.getElementById('toast');
        let deliveryImages = [];
        let harborDomain = 'harbor.wh02.com';

        function showToast(message) {
            toastEl.textContent = message;
            toastEl.classList.add('show');
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => toastEl.classList.remove('show'), 1800);
        }

        async function copyText(text, message) {
            try {
                await navigator.clipboard.writeText(text);
                showToast(message || '复制成功');
            } catch (error) {
                window.prompt('复制失败，请手动复制：', text);
            }
        }

        async function requestJson(url, options) {
            const response = await fetch(url, options);
            const data = await response.json();
            if (!response.ok || !data.success) {
                throw new Error(data.error || '请求失败');
            }
            return data;
        }

        function buildPullCommand(fullName, tool) {
            return `${tool} pull ${fullName}`;
        }

        function buildLoginAndPullCommand(fullName, tool) {
            return `${tool} login ${harborDomain}\n${tool} pull ${fullName}`;
        }

        function renderCommandButtons(fullName) {
            if (!fullName) return '';
            return `
                <div class="command-row">
                    <select data-command-tool>
                        <option value="docker">docker</option>
                        <option value="nerdctl">nerdctl</option>
                        <option value="crictl">crictl</option>
                    </select>
                    <button type="button" class="ghost" data-command-mode="pull" data-command-target="${fullName}">复制命令</button>
                    <button type="button" class="ghost" data-command-mode="login" data-command-target="${fullName}">复制登录+拉取</button>
                </div>
            `;
        }

        function bindCopyButtons(scope) {
            scope.querySelectorAll('[data-command-target]').forEach((button) => {
                button.addEventListener('click', async () => {
                    const wrapper = button.closest('.command-row');
                    const tool = wrapper ? wrapper.querySelector('[data-command-tool]').value : 'docker';
                    const fullName = button.getAttribute('data-command-target');
                    const mode = button.getAttribute('data-command-mode');
                    const text = mode === 'login'
                        ? buildLoginAndPullCommand(fullName, tool)
                        : buildPullCommand(fullName, tool);
                    await copyText(text, mode === 'login' ? '登录加拉取命令已复制' : '拉取命令已复制');
                });
            });
        }

        async function loadSettings() {
            const data = await requestJson('/api/v2/settings');
            harborDomain = data.settings.harborDomain || harborDomain;
        }

        async function loadMe() {
            const code = codeEl.value.trim();
            if (!code) {
                throw new Error('请输入串码');
            }
            const data = await requestJson(`/api/v2/me?code=${encodeURIComponent(code)}`);
            namespaceInfoEl.textContent = `命名空间：${data.accessCode.harborProjectName}`;
        }

        function rebuildProjectFilter() {
            const current = projectFilterEl.value;
            const names = new Set();
            deliveryImages.forEach((item) => (item.projectNames || []).forEach((name) => names.add(name)));
            projectFilterEl.innerHTML = '<option value="">全部项目</option>';
            Array.from(names).sort().forEach((name) => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                projectFilterEl.appendChild(option);
            });
            if (names.has(current)) {
                projectFilterEl.value = current;
            }
        }

        function render() {
            const keyword = filterKeywordEl.value.trim().toLowerCase();
            const projectName = projectFilterEl.value;
            const filtered = deliveryImages.filter((item) => {
                const byKeyword = !keyword
                    || item.displayName.toLowerCase().includes(keyword)
                    || item.source.fullName.toLowerCase().includes(keyword)
                    || item.userTarget.fullName.toLowerCase().includes(keyword);
                const byProject = !projectName || (item.projectNames || []).includes(projectName);
                return byKeyword && byProject;
            });

            countInfoEl.textContent = `已交付：${filtered.length}`;
            if (!filtered.length) {
                cardsEl.innerHTML = '<div class="empty">当前筛选条件下没有可展示的交付镜像。</div>';
                return;
            }

            cardsEl.innerHTML = '';
            filtered.forEach((item) => {
                const card = document.createElement('article');
                card.className = 'card';
                card.innerHTML = `
                    <div class="title">
                        <strong>${item.displayName}</strong>
                        <span class="badge">已交付</span>
                    </div>
                    <div class="small">所属项目：${(item.projectNames || []).join(' / ') || '默认项目'}</div>
                    <code>拉取地址：${item.userTarget.fullName}</code>
                    <code>源镜像：${item.source.fullName}</code>
                    <code>缓存地址：${item.local.fullName || '默认缓存已命中'}</code>
                    ${renderCommandButtons(item.userTarget.fullName)}
                `;
                bindCopyButtons(card);
                cardsEl.appendChild(card);
            });
        }

        async function loadDeliveries() {
            try {
                await Promise.all([loadSettings(), loadMe()]);
                const data = await requestJson(`/api/v2/my-deliveries?code=${encodeURIComponent(codeEl.value.trim())}`);
                deliveryImages = data.images || [];
                rebuildProjectFilter();
                render();
            } catch (error) {
                cardsEl.innerHTML = `<div class="empty">${error.message}</div>`;
                countInfoEl.textContent = '已交付：0';
            }
        }

        document.getElementById('loadBtn').addEventListener('click', loadDeliveries);
        document.getElementById('refreshBtn').addEventListener('click', loadDeliveries);
        filterKeywordEl.addEventListener('input', render);
        projectFilterEl.addEventListener('change', render);

        const paramCode = new URLSearchParams(window.location.search).get('code');
        if (paramCode) {
            codeEl.value = paramCode;
            loadDeliveries();
        }
    </script>
</body>
</html>
