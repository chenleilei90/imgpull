<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImgPull 交付镜像</title>
    <style>
        :root {
            --bg: #edf4fb;
            --panel: rgba(255,255,255,0.94);
            --line: #d8e4f1;
            --ink: #0f172a;
            --muted: #5f6f86;
            --brand: #0f6fff;
            --teal: #0ea5a4;
            --shadow: 0 24px 56px rgba(15,23,42,0.1);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 10%, rgba(15,111,255,0.16), transparent 28%),
                radial-gradient(circle at 88% 10%, rgba(14,165,164,0.14), transparent 26%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
        }
        .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 56px; }
        .head, .section {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }
        .head { padding: 24px; margin-bottom: 18px; }
        .section { padding: 20px; }
        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(15,111,255,0.1);
            color: var(--brand);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        h1 { margin: 0 0 10px; font-size: 34px; }
        h2 { margin: 0 0 12px; font-size: 22px; }
        p { margin: 0; color: var(--muted); line-height: 1.7; }
        input, select, button, a.button {
            font: inherit;
            border-radius: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--ink);
        }
        button, a.button {
            border: none;
            cursor: pointer;
            padding: 12px 16px;
            color: white;
            background: linear-gradient(135deg, var(--brand) 0%, #3389ff 100%);
            text-decoration: none;
        }
        button.alt, a.button.alt {
            background: linear-gradient(135deg, var(--teal) 0%, #18b9b8 100%);
        }
        button.ghost, a.button.ghost {
            color: var(--brand);
            background: rgba(15,111,255,0.08);
            border: 1px solid rgba(15,111,255,0.18);
        }
        .toolbar {
            display: grid;
            grid-template-columns: 220px 1fr 220px 160px;
            gap: 12px;
            margin-top: 18px;
        }
        .table-wrap {
            border: 1px solid var(--line);
            border-radius: 18px;
            overflow: hidden;
            background: rgba(255,255,255,0.96);
        }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 12px 14px;
            border-bottom: 1px solid #e7eef7;
            text-align: left;
            vertical-align: top;
        }
        th { background: #f7fbff; color: #4f6078; font-weight: 700; }
        tr:last-child td { border-bottom: none; }
        .notice {
            margin-top: 14px;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.96);
            color: var(--muted);
        }
        @media (max-width: 980px) {
            .toolbar { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <section class="head">
            <div class="topbar">
                <div>
                    <div class="tag">交付镜像</div>
                    <h1>只看已经可拉取的专属镜像</h1>
                    <p>这里展示当前串码下已经交付完成的镜像。你可以按项目筛选、搜索镜像，并直接复制拉取命令。</p>
                </div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <a class="button ghost" href="/">首页</a>
                    <a class="button ghost" href="/console">用户控制台</a>
                </div>
            </div>

            <div class="toolbar">
                <input id="code" placeholder="请输入串码">
                <input id="keyword" placeholder="搜索镜像名称或项目名">
                <select id="projectFilter">
                    <option value="">全部项目</option>
                </select>
                <button id="loadBtn" type="button">加载交付镜像</button>
            </div>
            <div id="notice" class="notice">请输入串码后加载已交付镜像列表。</div>
        </section>

        <section class="section">
            <h2>已交付镜像</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>镜像</th>
                            <th>所属项目</th>
                            <th>专属地址</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="body">
                        <tr><td colspan="4" class="small">还没有交付镜像。</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const codeEl = document.getElementById('code');
        const keywordEl = document.getElementById('keyword');
        const projectFilterEl = document.getElementById('projectFilter');
        let allImages = [];

        codeEl.value = params.get('code') || '';

        function setNotice(message) {
            document.getElementById('notice').textContent = message;
        }

        function buildCommand(fullName) {
            return `docker pull ${fullName}`;
        }

        async function copyCommand(fullName) {
            const text = buildCommand(fullName);
            try {
                await navigator.clipboard.writeText(text);
                setNotice('拉取命令已复制。');
            } catch (error) {
                window.prompt('自动复制失败，请手动复制：', text);
            }
        }

        function renderProjects(images) {
            const names = new Set();
            images.forEach((item) => (item.projectNames || []).forEach((name) => names.add(name)));
            projectFilterEl.innerHTML = '<option value="">全部项目</option>' +
                Array.from(names).sort().map((name) => `<option value="${name}">${name}</option>`).join('');
        }

        function renderImages() {
            const keyword = keywordEl.value.trim().toLowerCase();
            const projectName = projectFilterEl.value;
            const rows = allImages.filter((item) => {
                const matchKeyword = !keyword
                    || item.displayName.toLowerCase().includes(keyword)
                    || (item.projectNames || []).join(',').toLowerCase().includes(keyword);
                const matchProject = !projectName || (item.projectNames || []).includes(projectName);
                return matchKeyword && matchProject;
            });

            const body = document.getElementById('body');
            if (!rows.length) {
                body.innerHTML = '<tr><td colspan="4">没有匹配的交付镜像。</td></tr>';
                return;
            }

            body.innerHTML = rows.map((item) => `
                <tr>
                    <td>
                        <strong>${item.displayName}</strong>
                        <div style="color:#5f6f86;font-size:12px;">${item.source.fullName}</div>
                    </td>
                    <td>${item.projectNames && item.projectNames.length ? item.projectNames.join('、') : '默认项目'}</td>
                    <td style="font-size:12px;color:#5f6f86;">${item.userTarget ? item.userTarget.fullName : '-'}</td>
                    <td><button class="ghost" type="button" data-copy="${item.userTarget ? item.userTarget.fullName : ''}">复制 docker</button></td>
                </tr>
            `).join('');

            body.querySelectorAll('[data-copy]').forEach((button) => {
                button.addEventListener('click', () => copyCommand(button.getAttribute('data-copy')));
            });
        }

        async function loadImages() {
            const code = codeEl.value.trim();
            if (!code) {
                setNotice('请输入串码后再加载交付镜像。');
                return;
            }

            setNotice('正在加载交付镜像，请稍候...');
            const response = await fetch(`/api/v2/my-deliveries?code=${encodeURIComponent(code)}`);
            const data = await response.json();
            if (!response.ok || !data.success) {
                setNotice(data.error || '加载交付镜像失败。');
                return;
            }

            allImages = data.images || [];
            renderProjects(allImages);
            renderImages();
            setNotice(`已加载 ${allImages.length} 条交付镜像。`);
        }

        keywordEl.addEventListener('input', renderImages);
        projectFilterEl.addEventListener('change', renderImages);
        document.getElementById('loadBtn').addEventListener('click', loadImages);

        if (codeEl.value) {
            loadImages();
        }
    </script>
</body>
</html>
