<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - ImgPull</title>
  <link rel="stylesheet" href="/public/assets/p0.css">
</head>
<body data-page="login">
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-copy">
        <a class="brand" href="/" style="color:#fff">
          <span class="brand-mark" style="background:rgba(255,255,255,.22)">I</span>
          <span>ImgPull</span>
        </a>
        <h1>登录后开始同步镜像</h1>
        <p>前端 P0 已直接对接后端接口：登录、注册、仓库管理、同步任务、同步记录和我的镜像都走真实 API。</p>
      </div>
      <div class="auth-form">
        <div class="grid two">
          <form class="form" id="loginForm">
            <h2>登录</h2>
            <input id="loginAccount" name="account" placeholder="用户名或邮箱" required>
            <input name="password" type="password" placeholder="密码" required>
            <button class="btn" type="submit">登录控制台</button>
          </form>
          <form class="form" id="registerForm">
            <h2>注册</h2>
            <input name="username" placeholder="用户名" required>
            <input name="email" type="email" placeholder="邮箱" required>
            <input name="password" type="password" placeholder="密码，至少 8 位" required>
            <button class="btn green" type="submit">创建账号</button>
          </form>
        </div>
      </div>
    </section>
  </main>
  <script src="/public/assets/p0.js"></script>
</body>
</html>
