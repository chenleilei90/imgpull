<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - 海外镜像同步平台</title>
  <link rel="stylesheet" href="/public/assets/p0.css">
</head>
<body data-page="login">
  <main class="login-shell">
    <section class="login-art">
      <a class="brand" href="/"><span class="logo-mark">◇</span><span>海外镜像同步平台</span></a>
      <div class="login-copy">
        <h1>一键同步全球公共镜像<br>加速您的<span>容器交付</span></h1>
        <p>将海外公共容器镜像安全、稳定、高效地同步到您的国内私有镜像仓库，加速构建与部署，保障业务连续性。</p>
        <div class="feature-list">
          <div class="feature-item"><span class="feature-icon">☁</span><div><strong>全球镜像覆盖</strong><small>支持 Docker Hub，后续扩展 GHCR、Quay 等主流仓库</small></div></div>
          <div class="feature-item"><span class="feature-icon">↯</span><div><strong>高速稳定同步</strong><small>多节点分布式加速，断点续传，稳定可靠</small></div></div>
          <div class="feature-item"><span class="feature-icon">盾</span><div><strong>安全合规可控</strong><small>私有仓库存储，权限精细管理，操作可审计</small></div></div>
          <div class="feature-item"><span class="feature-icon">图</span><div><strong>可视化监控</strong><small>同步状态、任务进度、仓库用量一目了然</small></div></div>
        </div>
      </div>
      <div class="cloud-visual">
        <div class="orbit"></div>
        <div class="cloud-core"></div>
        <div class="cube one">N</div>
        <div class="cube two">D</div>
      </div>
    </section>
    <section class="auth-pane">
      <div class="auth-box">
        <div class="auth-tabs">
          <button class="auth-tab active" data-target="loginForm">登录</button>
          <button class="auth-tab" data-target="registerForm">注册</button>
        </div>
        <form class="auth-form-panel active form-grid" id="loginForm">
            <label class="form-label">邮箱 / 用户名
              <input id="loginAccount" name="account" placeholder="请输入邮箱地址或用户名" required>
            </label>
            <label class="form-label">密码
              <input name="password" type="password" placeholder="请输入密码" required>
            </label>
            <div class="toolbar" style="margin:0">
              <label class="muted"><input type="checkbox"> 记住我</label>
              <a class="muted" href="#">忘记密码？</a>
            </div>
            <button class="btn" type="submit" style="width:100%">立即登录</button>
        </form>
        <form class="auth-form-panel form-grid" id="registerForm">
            <label class="form-label">用户名
              <input name="username" placeholder="请输入用户名" required>
            </label>
            <label class="form-label">邮箱
              <input name="email" type="email" placeholder="请输入邮箱" required>
            </label>
            <label class="form-label">密码
              <input name="password" type="password" placeholder="至少 8 位密码" required>
            </label>
            <button class="btn" type="submit" style="width:100%">立即注册</button>
        </form>
      </div>
    </section>
  </main>
  <script src="/public/assets/p0.js"></script>
</body>
</html>
