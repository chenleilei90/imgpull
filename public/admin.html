<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImgPull 后台管理</title>
    <style>
        :root {
            --bg: #edf4fb;
            --panel: rgba(255,255,255,0.94);
            --line: #d8e4f1;
            --ink: #0f172a;
            --muted: #5f6f86;
            --brand: #0f6fff;
            --teal: #0ea5a4;
            --ok: #16a34a;
            --warn: #f59e0b;
            --shadow: 0 24px 56px rgba(15,23,42,0.1);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 10%, rgba(15,111,255,0.16), transparent 28%),
                radial-gradient(circle at 90% 12%, rgba(14,165,164,0.14), transparent 26%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
        }
        .wrap { max-width: 1320px; margin: 0 auto; padding: 28px 20px 56px; }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(15,111,255,0.1);
            color: var(--brand);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        h1 { margin: 0 0 10px; font-size: 34px; }
        h2 { margin: 0 0 12px; font-size: 22px; }
        p { margin: 0; color: var(--muted); line-height: 1.7; }
        .button, button, input, select, textarea {
            font: inherit;
            border-radius: 14px;
        }
        .button, button {
            border: none;
            cursor: pointer;
            padding: 12px 16px;
            color: #fff;
            background: linear-gradient(135deg, var(--brand) 0%, #3389ff 100%);
            text-decoration: none;
        }
        .button.alt, button.alt {
            background: linear-gradient(135deg, var(--teal) 0%, #18b9b8 100%);
        }
        .button.ghost, button.ghost {
            color: var(--brand);
            background: rgba(15,111,255,0.08);
            border: 1px solid rgba(15,111,255,0.18);
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--ink);
        }
        .section {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 18px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .metric {
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255,255,255,0.96);
            padding: 16px;
        }
        .metric strong { display: block; font-size: 26px; }
        .grid-2, .grid-3 {
            display: grid;
            gap: 18px;
        }
        .grid-2 { grid-template-columns: 1.2fr 0.8fr; }
        .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .field-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }
        .field-grid .full { grid-column: 1 / -1; }
        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .notice {
            margin-top: 14px;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.96);
            color: var(--muted);
            line-height: 1.7;
        }
        .table-wrap {
            border: 1px solid var(--line);
            border-radius: 18px;
            overflow: hidden;
            background: rgba(255,255,255,0.96);
        }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td {
            padding: 12px 14px;
            border-bottom: 1px solid #e7eef7;
            text-align: left;
            vertical-align: top;
        }
        th { background: #f7fbff; color: #4f6078; font-weight: 700; }
        tr:last-child td { border-bottom: none; }
        .small { font-size: 12px; color: var(--muted); }
        @media (max-width: 1080px) {
            .stats, .grid-2, .grid-3, .field-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <div>
                <div class="tag">后台管理</div>
                <h1>站点设置、用户管理、任务和缓存概览</h1>
                <p>这里主要用于维护站点基础设置、Harbor 配置、缓存镜像、分发任务和用户串码状态。</p>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <a class="button ghost" href="/">首页</a>
                <a class="button ghost" href="/console">用户控制台</a>
            </div>
        </div>

        <section class="section">
            <h2>系统总览</h2>
            <div class="stats">
                <div class="metric"><div class="small">镜像目录</div><strong id="catalogCount">-</strong></div>
                <div class="metric"><div class="small">本地缓存</div><strong id="localCount">-</strong></div>
                <div class="metric"><div class="small">有效用户</div><strong id="userCount">-</strong></div>
                <div class="metric"><div class="small">已删除用户</div><strong id="deletedUserCount">-</strong></div>
                <div class="metric"><div class="small">项目总数</div><strong id="projectCount">-</strong></div>
                <div class="metric"><div class="small">排队任务</div><strong id="queuedTaskCount">-</strong></div>
            </div>
        </section>

        <div class="grid-2">
            <section class="section">
                <h2>站点与 Harbor 设置</h2>
                <div class="field-grid">
                    <input id="siteTitle" placeholder="站点标题">
                    <input id="siteSubtitle" placeholder="站点副标题">
                    <input id="cacheRetentionDays" placeholder="缓存保留天数，例如 30、0、-1">
                    <input id="icpBeian" placeholder="ICP 备案号">
                    <input id="gonganBeian" placeholder="公安备案信息">
                    <select id="defaultVisibility">
                        <option value="private">用户仓库私有</option>
                        <option value="public">用户仓库公开</option>
                    </select>
                    <input id="harborDomain" placeholder="Harbor 域名">
                    <input id="harborBaseUrl" placeholder="Harbor 地址，例如 https://harbor.example.com">
                    <input id="cacheProjectName" placeholder="默认缓存仓库名">
                    <input id="harborUsername" placeholder="Harbor 用户名">
                    <input id="harborPassword" type="password" placeholder="Harbor 密码">
                    <select id="dockerhubSearchEnabled">
                        <option value="1">启用 Docker Hub 搜索</option>
                        <option value="0">关闭 Docker Hub 搜索</option>
                    </select>
                    <textarea id="siteDescription" class="full" rows="3" placeholder="站点描述"></textarea>
                    <input id="footerLinks" class="full" placeholder="友情链接，多个可用逗号分隔">
                </div>
                <div class="toolbar">
                    <button id="saveSettingsBtn" type="button">保存设置</button>
                    <button id="testHarborBtn" class="alt" type="button">测试 Harbor</button>
                    <button id="runTasksBtn" class="ghost" type="button">执行排队任务</button>
                    <button id="cleanupBtn" class="ghost" type="button">清理过期缓存</button>
                </div>
                <div id="settingsNotice" class="notice">加载设置中...</div>
            </section>

            <section class="section">
                <h2>待清理用户</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>串码</th>
                                <th>删除时间</th>
                                <th>彻底清理时间</th>
                            </tr>
                        </thead>
                        <tbody id="retentionBody">
                            <tr><td colspan="3">暂无待清理用户。</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>

        <div class="grid-3">
            <section class="section">
                <h2>用户列表</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>串码</th>
                                <th>状态</th>
                                <th>命名空间</th>
                                <th>镜像数</th>
                            </tr>
                        </thead>
                        <tbody id="usersBody">
                            <tr><td colspan="4">暂无用户数据。</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="section">
                <h2>分发任务</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>镜像</th>
                                <th>状态</th>
                                <th>串码</th>
                                <th>目标地址</th>
                            </tr>
                        </thead>
                        <tbody id="tasksBody">
                            <tr><td colspan="4">暂无任务数据。</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="section">
                <h2>缓存镜像</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>镜像</th>
                                <th>缓存到期</th>
                                <th>最后访问</th>
                            </tr>
                        </thead>
                        <tbody id="cacheBody">
                            <tr><td colspan="3">暂无缓存镜像。</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <script>
        function setNotice(message) {
            document.getElementById('settingsNotice').textContent = message;
        }

        async function fetchJson(url, options) {
            const response = await fetch(url, options);
            const data = await response.json();
            if (!response.ok || !data.success) {
                throw new Error(data.error || '请求失败');
            }
            return data;
        }

        async function loadSummary() {
            const data = await fetchJson('/api/v2/admin/summary');
            const summary = data.summary || {};
            document.getElementById('catalogCount').textContent = summary.catalogCount ?? 0;
            document.getElementById('localCount').textContent = summary.localCatalogCount ?? 0;
            document.getElementById('userCount').textContent = summary.userCount ?? 0;
            document.getElementById('deletedUserCount').textContent = summary.deletedUserCount ?? 0;
            document.getElementById('projectCount').textContent = summary.projectCount ?? 0;
            document.getElementById('queuedTaskCount').textContent = summary.queuedTaskCount ?? 0;
        }

        async function loadSettings() {
            const data = await fetchJson('/api/v2/settings');
            const settings = data.settings || {};
            document.getElementById('siteTitle').value = settings.siteTitle || '';
            document.getElementById('siteSubtitle').value = settings.siteSubtitle || '';
            document.getElementById('siteDescription').value = settings.siteDescription || '';
            document.getElementById('footerLinks').value = settings.footerLinks || '';
            document.getElementById('icpBeian').value = settings.icpBeian || '';
            document.getElementById('gonganBeian').value = settings.gonganBeian || '';
            document.getElementById('harborDomain').value = settings.harborDomain || '';
            document.getElementById('harborBaseUrl').value = settings.harborBaseUrl || '';
            document.getElementById('harborUsername').value = settings.harborUsername || '';
            document.getElementById('harborPassword').value = settings.harborPassword || '';
            document.getElementById('cacheProjectName').value = settings.cacheProjectName || '';
            document.getElementById('cacheRetentionDays').value = settings.cacheRetentionDays ?? -1;
            document.getElementById('defaultVisibility').value = settings.defaultUserRepoVisibility || 'private';
            document.getElementById('dockerhubSearchEnabled').value = settings.dockerhubSearchEnabled ? '1' : '0';
        }

        async function loadUsers() {
            const data = await fetchJson('/api/v2/admin/users');
            const rows = data.users || [];
            const body = document.getElementById('usersBody');
            if (!rows.length) {
                body.innerHTML = '<tr><td colspan="4">暂无用户数据。</td></tr>';
                return;
            }
            body.innerHTML = rows.map((row) => `
                <tr>
                    <td><strong>${row.code}</strong><div class="small">${row.email || '-'}</div></td>
                    <td>${row.status}</td>
                    <td>${row.harborProjectName}</td>
                    <td>${row.imageCount}</td>
                </tr>
            `).join('');
        }

        async function loadTasks() {
            const data = await fetchJson('/api/v2/admin/tasks');
            const rows = data.tasks || [];
            const body = document.getElementById('tasksBody');
            if (!rows.length) {
                body.innerHTML = '<tr><td colspan="4">暂无任务数据。</td></tr>';
                return;
            }
            body.innerHTML = rows.map((row) => `
                <tr>
                    <td><strong>${row.displayName}</strong><div class="small">${row.projectName || '默认项目'}</div></td>
                    <td>${row.status}</td>
                    <td>${row.accessCode}</td>
                    <td class="small">${row.targetFullName || '-'}</td>
                </tr>
            `).join('');
        }

        async function loadCache() {
            const data = await fetchJson('/api/v2/cache/images');
            const rows = data.images || [];
            const body = document.getElementById('cacheBody');
            if (!rows.length) {
                body.innerHTML = '<tr><td colspan="3">暂无缓存镜像。</td></tr>';
                return;
            }
            body.innerHTML = rows.map((row) => `
                <tr>
                    <td><strong>${row.displayName}</strong><div class="small">${row.local.fullName || row.source.fullName}</div></td>
                    <td>${row.local.cacheExpiresAt || '未设置'}</td>
                    <td>${row.local.cacheLastSeenAt || '未记录'}</td>
                </tr>
            `).join('');
        }

        async function loadRetention() {
            const data = await fetchJson('/api/v2/retention/pending-purge');
            const rows = data.rows || [];
            const body = document.getElementById('retentionBody');
            if (!rows.length) {
                body.innerHTML = '<tr><td colspan="3">暂无待清理用户。</td></tr>';
                return;
            }
            body.innerHTML = rows.map((row) => `
                <tr>
                    <td>${row.code}</td>
                    <td>${row.deleted_at || '-'}</td>
                    <td>${row.purge_after || '-'}</td>
                </tr>
            `).join('');
        }

        function settingsPayload() {
            return {
                siteTitle: document.getElementById('siteTitle').value.trim(),
                siteSubtitle: document.getElementById('siteSubtitle').value.trim(),
                siteDescription: document.getElementById('siteDescription').value.trim(),
                footerLinks: document.getElementById('footerLinks').value.trim(),
                icpBeian: document.getElementById('icpBeian').value.trim(),
                gonganBeian: document.getElementById('gonganBeian').value.trim(),
                harborDomain: document.getElementById('harborDomain').value.trim(),
                harborBaseUrl: document.getElementById('harborBaseUrl').value.trim(),
                harborUsername: document.getElementById('harborUsername').value.trim(),
                harborPassword: document.getElementById('harborPassword').value,
                harborEnabled: !!document.getElementById('harborBaseUrl').value.trim(),
                cacheProjectName: document.getElementById('cacheProjectName').value.trim(),
                cacheRetentionDays: document.getElementById('cacheRetentionDays').value.trim(),
                defaultUserRepoVisibility: document.getElementById('defaultVisibility').value,
                dockerhubSearchEnabled: document.getElementById('dockerhubSearchEnabled').value === '1'
            };
        }

        async function saveSettings() {
            try {
                await fetchJson('/api/v2/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settingsPayload())
                });
                setNotice('设置已保存。');
            } catch (error) {
                setNotice(error.message);
            }
        }

        async function testHarbor() {
            try {
                const payload = settingsPayload();
                const data = await fetchJson('/api/v2/settings/test-harbor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        harborBaseUrl: payload.harborBaseUrl,
                        harborUsername: payload.harborUsername,
                        harborPassword: payload.harborPassword
                    })
                });
                setNotice(data.message || 'Harbor 连接测试成功。');
            } catch (error) {
                setNotice(error.message);
            }
        }

        async function runQueued() {
            try {
                const data = await fetchJson('/api/v2/admin/tasks/run-queued', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ limit: 10 })
                });
                setNotice(`已执行 ${data.executedCount} 个排队任务。`);
                await Promise.all([loadSummary(), loadTasks()]);
            } catch (error) {
                setNotice(error.message);
            }
        }

        async function cleanupCache() {
            try {
                const data = await fetchJson('/api/v2/admin/cache/cleanup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                setNotice(`缓存清理完成，本次处理 ${data.cleanedCount || 0} 条记录。`);
                await Promise.all([loadCache(), loadSummary()]);
            } catch (error) {
                setNotice(error.message);
            }
        }

        async function boot() {
            try {
                setNotice('正在加载后台数据...');
                await Promise.all([loadSummary(), loadSettings(), loadUsers(), loadTasks(), loadCache(), loadRetention()]);
                setNotice('后台数据加载完成。');
            } catch (error) {
                setNotice(error.message);
            }
        }

        document.getElementById('saveSettingsBtn').addEventListener('click', saveSettings);
        document.getElementById('testHarborBtn').addEventListener('click', testHarbor);
        document.getElementById('runTasksBtn').addEventListener('click', runQueued);
        document.getElementById('cleanupBtn').addEventListener('click', cleanupCache);

        boot();
    </script>
</body>
</html>
