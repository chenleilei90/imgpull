<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImgPull 用户控制台</title>
    <style>
        :root {
            --bg: #edf4fb;
            --panel: rgba(255, 255, 255, 0.94);
            --line: #d8e4f1;
            --ink: #0f172a;
            --muted: #5f6f86;
            --brand: #0f6fff;
            --teal: #0ea5a4;
            --ok: #16a34a;
            --warn: #f59e0b;
            --shadow: 0 24px 56px rgba(15, 23, 42, 0.1);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            color: var(--ink);
            font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background:
                radial-gradient(circle at 10% 10%, rgba(15, 111, 255, 0.16), transparent 28%),
                radial-gradient(circle at 90% 10%, rgba(14, 165, 164, 0.13), transparent 26%),
                linear-gradient(180deg, #f8fbff 0%, #edf4fb 100%);
        }
        .wrap { max-width: 1280px; margin: 0 auto; padding: 28px 20px 56px; }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .links { display: flex; gap: 10px; flex-wrap: wrap; }
        .button, button, input, select {
            border-radius: 14px;
            font: inherit;
        }
        .button, button {
            border: none;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, var(--brand) 0%, #3389ff 100%);
            padding: 12px 16px;
            text-decoration: none;
        }
        .button.alt, button.alt {
            background: linear-gradient(135deg, var(--teal) 0%, #18b9b8 100%);
        }
        .button.ghost, button.ghost {
            color: var(--brand);
            background: rgba(15, 111, 255, 0.08);
            border: 1px solid rgba(15, 111, 255, 0.18);
        }
        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--ink);
        }
        .hero, .section {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }
        .hero { padding: 22px; margin-bottom: 18px; }
        .section { padding: 20px; }
        .grid-main {
            display: grid;
            grid-template-columns: 1.3fr 0.9fr;
            gap: 18px;
        }
        .hero-head {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 18px;
        }
        h1 { margin: 0 0 10px; font-size: 34px; line-height: 1.1; }
        h2 { margin: 0 0 12px; font-size: 22px; }
        h3 { margin: 0 0 10px; font-size: 18px; }
        p { margin: 0; color: var(--muted); line-height: 1.7; }
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(15, 111, 255, 0.1);
            color: var(--brand);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .meta-grid, .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }
        .stats { margin-top: 16px; }
        .metric {
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 16px;
            background: rgba(255,255,255,0.94);
        }
        .metric strong { display: block; font-size: 26px; }
        .toolbar {
            display: grid;
            grid-template-columns: 190px 1fr 170px 190px;
            gap: 12px;
            align-items: center;
        }
        .toolbar-2 {
            display: grid;
            grid-template-columns: 1fr 160px 170px;
            gap: 12px;
            margin-top: 14px;
        }
        .subgrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-top: 18px;
        }
        .table-wrap {
            border: 1px solid var(--line);
            border-radius: 18px;
            overflow: hidden;
            background: rgba(255,255,255,0.96);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 12px 14px;
            border-bottom: 1px solid #e7eef7;
            text-align: left;
            vertical-align: top;
        }
        th {
            background: #f7fbff;
            color: #4f6078;
            font-weight: 700;
        }
        tr:last-child td { border-bottom: none; }
        .small { color: var(--muted); font-size: 12px; }
        .status-pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(15, 111, 255, 0.1);
            color: var(--brand);
        }
        .status-pill.done {
            background: rgba(22, 163, 74, 0.12);
            color: var(--ok);
        }
        .status-pill.wait {
            background: rgba(245, 158, 11, 0.12);
            color: #b45309;
        }
        .inline-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .inline-actions button, .inline-actions select {
            width: auto;
        }
        .notice {
            margin-top: 14px;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.96);
            color: var(--muted);
            line-height: 1.7;
        }
        .notice.ok { border-color: rgba(22, 163, 74, 0.28); background: rgba(240, 253, 244, 0.96); color: #166534; }
        .notice.err { border-color: rgba(220, 38, 38, 0.28); background: rgba(254, 242, 242, 0.96); color: #991b1b; }
        .project-list {
            display: grid;
            gap: 10px;
        }
        .project-card {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px;
            background: rgba(255,255,255,0.96);
            cursor: pointer;
        }
        .project-card.active { border-color: rgba(15, 111, 255, 0.35); box-shadow: 0 0 0 2px rgba(15, 111, 255, 0.08); }
        @media (max-width: 1080px) {
            .hero-head, .grid-main, .subgrid, .meta-grid, .stats { grid-template-columns: 1fr; }
            .toolbar, .toolbar-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <div>
                <div class="tag">用户控制台</div>
                <h1>镜像搜索、项目管理和交付查看</h1>
            </div>
            <div class="links">
                <a class="button ghost" href="/">返回首页</a>
                <a class="button ghost" href="/deliveries">交付镜像</a>
                <a class="button ghost" href="/admin">后台管理</a>
            </div>
        </div>

        <section class="hero">
            <div class="hero-head">
                <article>
                    <h2>授权信息</h2>
                    <div class="meta-grid">
                        <div class="metric"><div class="small">串码</div><strong id="metaCode">-</strong></div>
                        <div class="metric"><div class="small">专属命名空间</div><strong id="metaNamespace">-</strong></div>
                        <div class="metric"><div class="small">到期时间</div><strong id="metaExpire">-</strong></div>
                    </div>
                    <div id="meNotice" class="notice" style="margin-top:16px;">请在地址栏携带 `?code=你的串码` 访问，或回到首页重新输入串码。</div>
                </article>
                <article>
                    <h2>快速搜索</h2>
                    <div class="toolbar">
                        <select id="scope">
                            <option value="local">本地 Harbor</option>
                            <option value="dockerhub">Docker Hub</option>
                            <option value="all">综合搜索</option>
                        </select>
                        <input id="keyword" placeholder="输入镜像名，例如 nginx、redis、calico/node">
                        <select id="projectSelect"></select>
                        <button id="searchBtn" type="button">搜索镜像</button>
                    </div>
                    <div class="toolbar-2">
                        <input id="projectName" placeholder="新建项目名称，例如 k8s、test、ai-base">
                        <button id="createProjectBtn" class="alt" type="button">新建项目</button>
                        <button id="refreshBtn" class="ghost" type="button">刷新全部数据</button>
                    </div>
                    <div id="searchNotice" class="notice">选择搜索范围和项目后，即可把镜像直接加入项目并排队分发。</div>
                </article>
            </div>
        </section>

        <div class="grid-main">
            <section class="section">
                <h2>搜索结果</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>镜像</th>
                                <th>来源</th>
                                <th>状态</th>
                                <th>专属地址</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="searchBody">
                            <tr><td colspan="5" class="small">还没有搜索结果。</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="section">
                <h2>我的项目</h2>
                <div id="projectList" class="project-list"></div>
            </section>
        </div>

        <div class="subgrid">
            <section class="section">
                <h2>我的镜像</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>镜像</th>
                                <th>所属项目</th>
                                <th>拉取命令</th>
                                <th>项目归类</th>
                            </tr>
                        </thead>
                        <tbody id="imagesBody">
                            <tr><td colspan="4" class="small">当前还没有加入项目的镜像。</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="section">
                <h2>最近任务</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>镜像</th>
                                <th>状态</th>
                                <th>项目</th>
                                <th>时间</th>
                            </tr>
                        </thead>
                        <tbody id="tasksBody">
                            <tr><td colspan="4" class="small">还没有任务记录。</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let accessCode = params.get('code') || '';
        let currentProjects = [];
        let currentImages = [];

        function setNotice(id, message, type) {
            const el = document.getElementById(id);
            el.className = `notice${type ? ` ${type}` : ''}`;
            el.textContent = message;
        }

        function getStatusClass(status) {
            if (status === 'completed') return 'status-pill done';
            if (status === 'queued' || status === 'pulling' || status === 'distributing') return 'status-pill wait';
            return 'status-pill';
        }

        function buildCommand(fullName) {
            return `docker pull ${fullName}`;
        }

        async function copyText(text, successMessage) {
            try {
                await navigator.clipboard.writeText(text);
                setNotice('searchNotice', successMessage, 'ok');
            } catch (error) {
                window.prompt('自动复制失败，请手动复制：', text);
            }
        }

        async function fetchJson(url, options) {
            const response = await fetch(url, options);
            const data = await response.json();
            if (!response.ok || !data.success) {
                throw new Error(data.error || '请求失败');
            }
            return data;
        }

        function renderProjects() {
            const list = document.getElementById('projectList');
            const select = document.getElementById('projectSelect');

            if (!currentProjects.length) {
                list.innerHTML = '<div class="project-card">当前还没有项目，请先创建一个。</div>';
                select.innerHTML = '<option value="">请先创建项目</option>';
                return;
            }

            list.innerHTML = currentProjects.map((project, index) => `
                <div class="project-card ${index === 0 ? 'active' : ''}" data-project-id="${project.id}">
                    <strong>${project.name}</strong>
                    <div class="small" style="margin-top:6px;">镜像数量：${project.image_count || 0}</div>
                    <div class="small">标识：${project.slug}</div>
                </div>
            `).join('');

            select.innerHTML = currentProjects.map((project) => `<option value="${project.id}">${project.name}</option>`).join('');
        }

        function renderSearchResults(results) {
            const body = document.getElementById('searchBody');
            if (!results.length) {
                body.innerHTML = '<tr><td colspan="5" class="small">没有搜索到镜像。</td></tr>';
                return;
            }

            body.innerHTML = results.map((item) => {
                const task = item.latestTask;
                const acquired = task && task.status === 'completed';
                const targetName = item.userTarget ? item.userTarget.fullName : '-';
                return `
                    <tr>
                        <td>
                            <strong>${item.displayName}</strong>
                            <div class="small">${item.source.fullName}</div>
                        </td>
                        <td>${item.local.available ? '本地 Harbor' : 'Docker Hub'}</td>
                        <td><span class="${getStatusClass(task ? task.status : 'none')}">${acquired ? '已获取' : (task ? task.status : '未获取')}</span></td>
                        <td class="small">${targetName}</td>
                        <td>
                            <div class="inline-actions">
                                ${acquired
                                    ? `<button class="ghost" type="button" data-copy="${targetName}">复制命令</button>`
                                    : `<button type="button" data-add="${item.id}">加入项目</button>`}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            body.querySelectorAll('[data-add]').forEach((button) => {
                button.addEventListener('click', () => addImageToSelectedProject(button.getAttribute('data-add')));
            });
            body.querySelectorAll('[data-copy]').forEach((button) => {
                button.addEventListener('click', () => copyText(buildCommand(button.getAttribute('data-copy')), '拉取命令已复制。'));
            });
        }

        function renderImages() {
            const body = document.getElementById('imagesBody');
            if (!currentImages.length) {
                body.innerHTML = '<tr><td colspan="4" class="small">当前还没有加入项目的镜像。</td></tr>';
                return;
            }

            body.innerHTML = currentImages.map((item) => {
                const options = currentProjects.map((project) => `
                    <option value="${project.id}" ${item.projectNames.includes(project.name) ? 'selected' : ''}>${project.name}</option>
                `).join('');
                return `
                    <tr>
                        <td>
                            <strong>${item.displayName}</strong>
                            <div class="small">${item.userTarget ? item.userTarget.fullName : '-'}</div>
                        </td>
                        <td>${item.projectNames.length ? item.projectNames.join('、') : '默认项目'}</td>
                        <td>
                            <div class="inline-actions">
                                <button class="ghost" type="button" data-copy-target="${item.userTarget ? item.userTarget.fullName : ''}">复制 docker</button>
                            </div>
                        </td>
                        <td>
                            <select multiple size="3" data-image-projects="${item.id}">${options}</select>
                            <div class="small" style="margin-top:6px;">按住 Ctrl 可多选，修改后自动保存。</div>
                        </td>
                    </tr>
                `;
            }).join('');

            body.querySelectorAll('[data-copy-target]').forEach((button) => {
                button.addEventListener('click', () => copyText(buildCommand(button.getAttribute('data-copy-target')), '拉取命令已复制。'));
            });
            body.querySelectorAll('[data-image-projects]').forEach((select) => {
                select.addEventListener('change', () => updateImageProjects(select));
            });
        }

        function renderTasks(tasks) {
            const body = document.getElementById('tasksBody');
            if (!tasks.length) {
                body.innerHTML = '<tr><td colspan="4" class="small">还没有任务记录。</td></tr>';
                return;
            }
            body.innerHTML = tasks.map((task) => `
                <tr>
                    <td>
                        <strong>${task.displayName}</strong>
                        <div class="small">${task.targetFullName || '-'}</div>
                    </td>
                    <td><span class="${getStatusClass(task.status)}">${task.status}</span></td>
                    <td>${task.projectName || '默认项目'}</td>
                    <td class="small">${task.requestedAt || '-'}</td>
                </tr>
            `).join('');
        }

        async function loadMe() {
            const data = await fetchJson(`/api/v2/me?code=${encodeURIComponent(accessCode)}`);
            document.getElementById('metaCode').textContent = data.accessCode.code;
            document.getElementById('metaNamespace').textContent = data.accessCode.harborProjectName;
            document.getElementById('metaExpire').textContent = data.accessCode.expireAt || '永久或未设置';
            setNotice('meNotice', `当前授权邮箱：${data.accessCode.email || '未记录'}，仓库可见性：${data.accessCode.visibility || 'private'}`, 'ok');
        }

        async function loadProjects() {
            const data = await fetchJson(`/api/v2/projects?code=${encodeURIComponent(accessCode)}`);
            currentProjects = data.projects || [];
            renderProjects();
        }

        async function loadMyImages() {
            const data = await fetchJson(`/api/v2/my-images?code=${encodeURIComponent(accessCode)}`);
            currentImages = data.images || [];
            renderImages();
        }

        async function loadTasks() {
            const data = await fetchJson(`/api/v2/tasks?code=${encodeURIComponent(accessCode)}`);
            renderTasks(data.tasks || []);
        }

        async function searchImages() {
            const keyword = document.getElementById('keyword').value.trim();
            if (!keyword) {
                setNotice('searchNotice', '请输入镜像关键字后再搜索。', 'err');
                return;
            }
            setNotice('searchNotice', '正在搜索镜像，请稍候...', '');
            try {
                const scope = document.getElementById('scope').value;
                const data = await fetchJson(`/api/v2/search/images?code=${encodeURIComponent(accessCode)}&scope=${encodeURIComponent(scope)}&q=${encodeURIComponent(keyword)}`);
                renderSearchResults(data.results || []);
                setNotice('searchNotice', `搜索完成，共返回 ${(data.results || []).length} 条结果。`, 'ok');
            } catch (error) {
                setNotice('searchNotice', error.message, 'err');
            }
        }

        async function createProject() {
            const name = document.getElementById('projectName').value.trim();
            if (!name) {
                setNotice('searchNotice', '请输入项目名称后再创建。', 'err');
                return;
            }
            try {
                await fetchJson('/api/v2/projects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: accessCode, name })
                });
                document.getElementById('projectName').value = '';
                await loadProjects();
                await loadMyImages();
                setNotice('searchNotice', '项目创建成功。', 'ok');
            } catch (error) {
                setNotice('searchNotice', error.message, 'err');
            }
        }

        async function addImageToSelectedProject(imageId) {
            const projectId = document.getElementById('projectSelect').value;
            if (!projectId) {
                setNotice('searchNotice', '请先选择一个项目。', 'err');
                return;
            }
            try {
                await fetchJson(`/api/v2/projects/${projectId}/images`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: accessCode, catalogImageId: Number(imageId) })
                });
                await Promise.all([loadProjects(), loadMyImages(), loadTasks()]);
                setNotice('searchNotice', '镜像已加入项目，并已排队分发。', 'ok');
            } catch (error) {
                setNotice('searchNotice', error.message, 'err');
            }
        }

        async function updateImageProjects(select) {
            const imageId = select.getAttribute('data-image-projects');
            const projectIds = Array.from(select.selectedOptions).map((item) => Number(item.value));
            try {
                await fetchJson(`/api/v2/images/${imageId}/projects`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: accessCode, projectIds })
                });
                await Promise.all([loadProjects(), loadMyImages()]);
                setNotice('searchNotice', '项目归类已自动保存。', 'ok');
            } catch (error) {
                setNotice('searchNotice', error.message, 'err');
            }
        }

        async function boot() {
            if (!accessCode) {
                setNotice('meNotice', '未检测到串码，请回到首页重新输入串码。', 'err');
                return;
            }
            try {
                await Promise.all([loadMe(), loadProjects(), loadMyImages(), loadTasks()]);
            } catch (error) {
                setNotice('meNotice', error.message, 'err');
            }
        }

        document.getElementById('searchBtn').addEventListener('click', searchImages);
        document.getElementById('createProjectBtn').addEventListener('click', createProject);
        document.getElementById('refreshBtn').addEventListener('click', boot);

        boot();
    </script>
</body>
</html>
